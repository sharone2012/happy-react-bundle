name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: happy-react-bundle/package-lock.json

      - name: Install frontend dependencies
        working-directory: happy-react-bundle
        run: npm ci --legacy-peer-deps

      - name: Build React app
        working-directory: happy-react-bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync built frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            happy-react-bundle/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/dist/

      - name: Sync backend
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/backend/

      - name: Install prod deps & restart API
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            printf "VITE_SUPABASE_URL=%s\nVITE_SUPABASE_PUBLISHABLE_KEY=%s\nSUPABASE_URL=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nNODE_ENV=production\nPORT=3001\n" \
              "${{ secrets.VITE_SUPABASE_URL }}" \
              "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
              "${{ secrets.SUPABASE_URL }}" \
              "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" > ~/backend/.env
            chmod -R 755 ~/app/dist/
            cd ~/backend
            npm install --omit=dev --legacy-peer-deps
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save
          ENDSSH
