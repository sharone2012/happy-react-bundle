name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build React app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync built frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/dist/

      - name: Sync server files
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server.cjs ecosystem.config.cjs nginx.conf package.json package-lock.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/

          if [ -d "api" ]; then
            rsync -az \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              api/ \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/api/
          fi

      - name: Install prod deps & restart API
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/app
            
            printf "VITE_SUPABASE_URL=%s\nVITE_SUPABASE_PUBLISHABLE_KEY=%s\nSUPABASE_URL=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nNODE_ENV=production\nPORT=3001\n" \
            "${{ secrets.VITE_SUPABASE_URL }}" \
            "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}" \
            "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" > .env

            chmod -R 755 dist/
            npm install --omit=dev --legacy-peer-deps
            
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save
          ENDSSH