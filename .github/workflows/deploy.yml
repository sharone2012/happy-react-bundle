name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build React app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync built frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/dist/

      - name: Sync server files
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            server.cjs \
            ecosystem.config.cjs \
            nginx.conf \
            package.json \
            package-lock.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            api/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/api/

      - name: Install prod deps & restart API
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail

            # Write .env from GitHub secrets
            cat > ~/app/.env << ENVEOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          ENVEOF

            cd ~/app
            npm install --omit=dev --legacy-peer-deps
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null \
              || pm2 start ecosystem.config.cjs
            pm2 save
          ENDSSH
