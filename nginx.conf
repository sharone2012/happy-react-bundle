# ── CFI nginx config ──────────────────────────────────────────────────────────
# SSL certificate managed by Let's Encrypt / certbot
# Auto-renewal is configured via systemd timer on the server
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name cfideeptech.com www.cfideeptech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name cfideeptech.com www.cfideeptech.com;

    ssl_certificate     /etc/letsencrypt/live/cfideeptech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cfideeptech.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /home/ec2-user/app/dist;
    index index.html;
    client_max_body_size 2M;

    # Proxy /api/* → Node/Express on 127.0.0.1:3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # s3 module entry point
    location = /s3 { try_files /s3.html =404; }

    # Long-lived cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # React Router SPA fallback
    location / { try_files $uri $uri/ /index.html; }
}
