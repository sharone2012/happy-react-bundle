# ── CFI nginx config ──────────────────────────────────────────────────────────
# 1. Replace YOUR_DOMAIN.com with your real domain in deploy.sh (done automatically)
# 2. sudo certbot --nginx -d YOUR_DOMAIN.com -d www.YOUR_DOMAIN.com  (after DNS)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name cfideeptech.com www.cfideeptech.com;

    # Serve compiled React app from dist/
    root  /home/ec2-user/app/dist;
    index index.html;

    client_max_body_size 2M;

    # Proxy /api/* → Node/Express on 127.0.0.1:3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # s3 module entry point
    location = /s3 { try_files /s3.html =404; }

    # Long-lived cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router SPA fallback
    location / { try_files $uri $uri/ /index.html; }
}
