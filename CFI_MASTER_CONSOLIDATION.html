*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060C14;--bg2:#0D1520;--card:#111B27;--bdr:#1E2D3D;--teal:#40D7C5;--amber:#F5A623;--green:#00A249;--blue:#4A90D9;--txt:#E8ECF1;--dim:#8899AA;--muted:#5A6B7C}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;line-height:1.6}
.c{max-width:1200px;margin:0 auto;padding:20px}
.hdr{text-align:center;padding:48px 20px 32px;border-bottom:1px solid var(--bdr)}
.brand{font-family:'EB Garamond',serif;font-size:2.8rem;font-weight:700;color:var(--teal)}
.sub{font-size:1rem;color:var(--dim);margin-top:4px}
.line{width:80px;height:3px;background:linear-gradient(90deg,var(--teal),var(--amber));margin:20px auto 0;border-radius:2px}
.tk{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;padding:24px 20px;border-bottom:1px solid var(--bdr)}
.ti{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 18px;text-align:center;min-width:130px}
.tn{font-size:1.5rem;font-weight:700;color:var(--teal)}.tl{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sec{margin:16px 0;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;background:var(--bg2)}
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;cursor:pointer;user-select:none}
.sh:hover{background:var(--card)}
.st{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:10px}
.tag{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;color:#fff}
.sc{font-size:.8rem;color:var(--dim)}.chv{color:var(--dim);transition:transform .3s}.chv.o{transform:rotate(180deg)}
.sb{display:none;padding:0 24px 20px}.sb.o{display:block}
.subh{font-size:.82rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;padding:8px 10px;color:var(--dim);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr)}
td{padding:8px 10px;border-bottom:1px solid rgba(30,45,61,.5);vertical-align:top}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(64,215,197,.04)}
.fn{font-weight:600;word-break:break-all}.fd{color:var(--dim);font-size:.8rem}
.b{display:inline-block;font-size:.63rem;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;margin-right:5px}
.bg{background:var(--green);color:#fff}.bb{background:var(--blue);color:#fff}.ba{background:var(--amber);color:#000}.bt{background:var(--teal);color:#000}
.rp{display:inline-block;background:rgba(64,215,197,.12);color:var(--teal);font-size:.7rem;font-weight:600;padding:2px 7px;border-radius:4px;margin-left:4px}
.ph{text-align:center;padding:40px;color:var(--muted);font-style:italic}
.ft{text-align:center;padding:32px 20px;color:var(--muted);font-size:.75rem;border-top:1px solid var(--bdr);margin-top:24px}
@media(max-width:768px){.c{padding:12px}.brand{font-size:2rem}.sh{padding:12px 16px}.sb{padding:0 12px 16px}table{font-size:.78rem}}
</style>

function countAssets(s){if(s.placeholder)return"Not yet started";let n=0;(s.groups||[]).forEach(g=>n+=g.rows.length);return n+" assets"}
function render(){const app=document.getElementById("app");let h="";D.forEach(s=>{const open=s.open?" o":"";
h+=`<div class="sec"><div class="sh" onclick="tog(this)"><div class="st"><span class="tag" style="background:${s.color};${['#40D7C5','#F5A623'].includes(s.color)?'color:#000':''}">${s.tag}</span>${esc(s.title)}</div><div style="display:flex;align-items:center;gap:12px"><span class="sc">${countAssets(s)}</span><span class="chv${open}">&#9660;</span></div></div><div class="sb${open}">`;
if(s.placeholder){h+=`<div class="ph">${esc(s.placeholder)}</div>`}else{(s.groups||[]).forEach(g=>{
h+=`<div class="subh">${esc(g.h)}</div><table><tr>${g.cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`;
g.rows.forEach(r=>{const bc=r[0],src=r[1],name=r[2],det=r[3];
let fnHtml=name.replace("<best>",` <span class="b bt">Best-in-Class</span>`);
let detHtml=det.replace(/<rp>/g,'<span class="rp">').replace(/<\/rp>/g,"</span>");
h+=`<tr><td><span class="b ${bc}">${esc(src)}</span></td><td class="fn">${fnHtml}</td><td class="fd">${detHtml}</td></tr>`});
h+=`</table>`})}
h+=`</div></div>`});app.innerHTML=h}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function tog(el){const b=el.nextElementSibling,c=el.querySelector(".chv");b.classList.toggle("o");c.classList.toggle("o")}
render();
