<script>
var zoom=0.65,panX=20,panY=20,drag=false,lx=0,ly=0;
var dwg=document.getElementById("dwg"),vp=document.getElementById("vp");
function apply(){dwg.style.transform="translate("+panX+"px,"+panY+"px) scale("+zoom+")";document.getElementById("zd").textContent=Math.round(zoom*100)+"%";}
function setZ(z){zoom=Math.max(0.12,Math.min(4,z));apply();}
function fit(){var ww=vp.clientWidth,wh=vp.clientHeight;zoom=Math.min(ww/1558,wh/1390)*0.88;panX=(ww-1558*zoom)/2;panY=10;apply();}
vp.addEventListener("mousedown",function(e){drag=true;lx=e.clientX;ly=e.clientY;vp.classList.add("g");});
document.addEventListener("mouseup",function(){drag=false;vp.classList.remove("g");});
document.addEventListener("mousemove",function(e){if(!drag)return;panX+=e.clientX-lx;panY+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();});
vp.addEventListener("wheel",function(e){e.preventDefault();var d=e.deltaY>0?-0.1:0.1;var r=vp.getBoundingClientRect();var mx=e.clientX-r.left,my=e.clientY-r.top;var nz=Math.max(0.12,Math.min(4,zoom+d));panX=mx-(mx-panX)*nz/zoom;panY=my-(my-panY)*nz/zoom;zoom=nz;apply();},{passive:false});
fit();window.addEventListener("resize",fit);
</script>
